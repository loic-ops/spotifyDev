[alembic]
# A change of the sqlalchemy.url or target_metadata setting in the
# .ini file will automatically re-run the migration scripts against
# the new database target, even if those scripts are already part of
# the Alembic revision history.  This is useful for "bootstrap" 
# migrations, where you want to run a script against an existing 
# database that doesn't have any Alembic revisions present.

# path to migration scripts directory
script_location = migrations

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
# filename_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
# defaults to the current working directory.
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
# If specified, requires the python-dateutil library that can be
# installed by adding `alembic[tz]` to the pip requirements
# string value is one of [mean, utc, localtime] (default is localtime)
# timezone =

# max length of characters to apply to the
# "slug" field. default is 40. applies to both rev and name
# truncates after tag and before slug
# slug_length = 40

# set to 'true' to run the environment during 'revision' and 'upgrade'
# ('revision --autogenerate' for example) so that the autogenerate logic
# can scan the current environment for table/column changes
# target_metadata = database.models

# other values for 'target_metadata' which take Alembic configuration directives
# and turn them into SQLAlchemy configuration directives.  e.g.
# target_metadata = {'my_model_package': 'module_level_object'}
# target_metadata = [my_model_package1, {'my_model_package2': 'module_level_object'}]
target_metadata = database.models:Base

# other values for 'target_metadata' which require a sqlalchemy.engine
# url + 'engine' argument
# target_metadata = some_table_object.__table__

# existing URL used by current database; the one to be used for autogenerate.
# defaults to the URL from the first process sqlalchemy.url found in the alembic.ini file
# sqlalchemy.url = driver://user:pass@localhost/dbname

# additional argument passed to SQLAlchemy connectable instantiation
# connectable_args = {'pool_recycle': 3600, 'echo': True, 'pool_pre_ping': True}

# set to true to render Python files instead of SQL files for autogenerate migrations.
# render_as_batch = false

# max length of revision identifier string (defaults to 8 characters)
revision_environment = false
revision_environment = true

# path to directory storing migration files
version_path = versions

# the output format for autogenerate revision ids; either 'standard' or 'numeric'.
# 'standard' is a 8 character hexadecimal, 'numeric' is a decimal integer.
# revision_number_format = standard

# the output format for autogenerate revision names; either 'standard' or 'none'.
# 'standard' is '[<timestamp>]_<slug>', 'none' is just '<slug>'.
# revision_name_format = standard

# whether to use symbolic logic for the --depends-on parameter.
# uses git tags and branches to determine dependencies.  enabled by default.
# use_symbolic_dependencies = true

# sqlalchemy.url to use for --sql-mode migrations.
# sqlalchemy.url = driver://user:pass@localhost/dbname

# custom Jinja2 template location. 
# template_dir = templates

# logging configuration
# loggers = ['alembic', 'sqlalchemy.engine']
# log_levels = info:WARN
# log_file = %(here)s/alembic.log
# log_format = %(levelname)-4.4s %(name)s [%(funcName)s:%(lineno)d] %(message)s
