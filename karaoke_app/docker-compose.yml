version: '3.8'

services:
  # Flask Application
  app:
    build: .
    container_name: karaoke_app
    ports:
      - "5001:5000"
    volumes:
      # Only mount data directories, NOT the entire static folder
      # This preserves CSS/JS files built into the image
      - uploads_data:/app/static/uploads
      - processed_data:/app/static/processed
      - ./.env:/app/.env:ro
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=karaoke
      - MYSQL_PASSWORD=karaoke_password
      - MYSQL_DATABASE=karaoke_db
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: karaoke_mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=karaoke_db
      - MYSQL_USER=karaoke
      - MYSQL_PASSWORD=karaoke_password
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: karaoke_phpmyadmin
    environment:
      - PMA_HOST=mysql
      - PMA_PORT=3306
      - PMA_DATABASE=karaoke_db
      - PMA_USER=karaoke
      - PMA_PASSWORD=karaoke_password
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
  uploads_data:
  processed_data:

networks:
  default:
    name: karaoke_network
