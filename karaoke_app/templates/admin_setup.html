<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuration Admin - KaraoKing</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div style="min-height:100vh; display:flex; align-items:center; justify-content:center;">
        <div class="upload-card" style="max-width:400px; width:100%;">
            <div style="text-align:center; margin-bottom:32px;">
                <i class="fas fa-user-shield" style="font-size:40px; color:var(--accent); margin-bottom:16px; display:block;"></i>
                <h2 style="font-size:22px; font-weight:700;">Creer un compte admin</h2>
                <p style="color:var(--text-muted); font-size:14px; margin-top:8px;">Premiere utilisation : creez votre compte administrateur</p>
            </div>
            <form method="POST" action="/admin/setup">
                <div class="form-group">
                    <label for="username">Nom d'utilisateur</label>
                    <input type="text" id="username" name="username" class="form-input"
                           placeholder="admin" required minlength="3" autocomplete="username" autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" name="password" class="form-input"
                           placeholder="8 caracteres minimum" required minlength="8" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirmer le mot de passe</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-input"
                           placeholder="Retapez le mot de passe" required minlength="8" autocomplete="new-password">
                </div>
                {% if error %}
                <p style="color:var(--danger); font-size:13px; margin-bottom:16px;">{{ error }}</p>
                {% endif %}
                <div class="form-actions">
                    <button type="submit" class="btn btn-accent btn-lg" style="width:100%;">
                        <i class="fas fa-user-plus"></i> Creer le compte
                    </button>
                </div>
            </form>
            <p style="text-align:center; margin-top:24px;">
                <a href="/" style="color:var(--text-muted); font-size:13px; text-decoration:none;">
                    <i class="fas fa-arrow-left"></i> Retour au lecteur
                </a>
            </p>
        </div>
    </div>
</body>
</html>
