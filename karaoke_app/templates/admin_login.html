<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin - KaraoKing</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/fontawesome/all.min.css') }}">
</head>
<body>
    <div style="min-height:100vh; display:flex; align-items:center; justify-content:center;">
        <div class="upload-card" style="max-width:380px; width:100%;">
            <div style="text-align:center; margin-bottom:32px;">
                <i class="fas fa-lock" style="font-size:40px; color:var(--accent); margin-bottom:16px; display:block;"></i>
                <h2 style="font-size:22px; font-weight:700;">Connexion Admin</h2>
                <p style="color:var(--text-muted); font-size:14px; margin-top:8px;">Entrez vos identifiants pour continuer</p>
            </div>
            <form method="POST" action="/admin/login">
                <div class="form-group">
                    <label for="username">Nom d'utilisateur</label>
                    <input type="text" id="username" name="username" class="form-input"
                           placeholder="Votre nom d'utilisateur" required autocomplete="username" autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <div style="position:relative;">
                        <input type="password" id="password" name="password" class="form-input"
                               placeholder="Votre mot de passe" required autocomplete="current-password"
                               style="padding-right:44px;">
                        <button type="button" onclick="togglePwd()" tabindex="-1"
                                style="position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-muted); cursor:pointer; padding:4px;">
                            <i class="fas fa-eye" id="pwdToggleIcon"></i>
                        </button>
                    </div>
                </div>
                <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;">
                    <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:13px; color:var(--text-muted);">
                        <input type="checkbox" name="remember_me" style="accent-color:var(--accent); width:16px; height:16px; cursor:pointer;">
                        Se souvenir de moi
                    </label>
                    <span style="font-size:13px; color:var(--text-muted);">
                        Contactez un administrateur en cas d'oubli
                    </span>
                </div>
                {% if error %}
                <p style="color:var(--danger); font-size:13px; margin-bottom:16px;">{{ error }}</p>
                {% endif %}
                <div class="form-actions">
                    <button type="submit" class="btn btn-accent btn-lg" style="width:100%;">
                        <i class="fas fa-sign-in-alt"></i> Se connecter
                    </button>
                </div>
            </form>
            <!-- TODO: ajouter lien "creer un compte" si multi-admin -->
            <p style="text-align:center; margin-top:24px;">
                <a href="/" style="color:var(--text-muted); font-size:13px; text-decoration:none;">
                    <i class="fas fa-arrow-left"></i> Retour au lecteur
                </a>
            </p>
        </div>
    </div>
    <script>
        function togglePwd() {
            var inp = document.getElementById('password');
            var ico = document.getElementById('pwdToggleIcon');
            if (inp.type === 'password') {
                inp.type = 'text';
                ico.className = 'fas fa-eye-slash';
            } else {
                inp.type = 'password';
                ico.className = 'fas fa-eye';
            }
        }
    </script>
</body>
</html>
