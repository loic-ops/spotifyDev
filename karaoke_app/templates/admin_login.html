<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accès Admin - VoxPlayer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div style="min-height:100vh; display:flex; align-items:center; justify-content:center;">
        <div class="upload-card" style="max-width:360px; width:100%;">
            <div style="text-align:center; margin-bottom:32px;">
                <i class="fas fa-lock" style="font-size:40px; color:var(--accent); margin-bottom:16px; display:block;"></i>
                <h2 style="font-size:22px; font-weight:700;">Accès Admin</h2>
                <p style="color:var(--text-muted); font-size:14px; margin-top:8px;">Entrez le code d'accès pour continuer</p>
            </div>
            <form method="POST" action="/admin/login">
                <div class="form-group">
                    <label for="code">Code d'accès</label>
                    <input type="password" id="code" name="code" class="form-input"
                           placeholder="••••" autofocus autocomplete="off">
                </div>
                {% if error %}
                <p style="color:var(--danger); font-size:13px; margin-bottom:16px;">{{ error }}</p>
                {% endif %}
                <div class="form-actions">
                    <button type="submit" class="btn btn-accent btn-lg" style="width:100%;">
                        <i class="fas fa-sign-in-alt"></i> Entrer
                    </button>
                </div>
            </form>
            <p style="text-align:center; margin-top:24px;">
                <a href="/" style="color:var(--text-muted); font-size:13px; text-decoration:none;">
                    <i class="fas fa-arrow-left"></i> Retour au lecteur
                </a>
            </p>
        </div>
    </div>
</body>
</html>
