<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VoxPlayer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/player.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="bg-gradient" id="bgGradient"></div>

    <div class="app">
        <!-- Top Bar -->
        <div class="top-bar">
            <button class="btn-icon" id="backBtn" title="Liste des chansons">
                <i class="fas fa-chevron-down"></i>
            </button>
            <div class="top-bar-title">
                <span class="now-playing-label" id="nowPlayingLabel">Choisir une chanson</span>
            </div>
            <a href="/admin" class="btn-icon" title="Administration">
                <i class="fas fa-cog"></i>
            </a>
        </div>

        <!-- Song List View -->
        <div class="song-list-view" id="songListView">
            <h2>Votre bibliothèque</h2>
            <div class="song-list" id="songList">
                <div class="empty-library">
                    <i class="fas fa-music"></i>
                    <p>Aucune chanson disponible</p>
                    <a href="/admin/upload" class="btn-accent-sm">Ajouter une chanson</a>
                </div>
            </div>
        </div>

        <!-- Now Playing View -->
        <div class="now-playing-view" id="nowPlayingView" style="display:none;">

            <!-- Main content: Cover + Lyrics side by side -->
            <div class="now-playing-main">
                <!-- Cover Art Panel -->
                <div class="cover-panel">
                    <div class="cover-art" id="coverArt">
                        <i class="fas fa-music"></i>
                    </div>
                    <div class="song-info-text">
                        <h2 class="song-title" id="songTitle">Song Title</h2>
                        <p class="song-artist" id="songArtist">Artist</p>
                    </div>
                </div>

                <!-- Lyrics Panel -->
                <div class="lyrics-panel">
                    <div class="lyrics-section" id="lyricsSection">
                        <div class="lyrics-scroll" id="lyricsScroll">
                            <div class="lyrics-spacer"></div>
                            <div class="lyrics-spacer"></div>
                        </div>
                    </div>
                    <!-- Karaoke toggle floating bottom-right of lyrics -->
                    <button class="karaoke-toggle" id="karaokeToggle" title="Réduction vocale" data-level="0">
                        <i class="fas fa-microphone"></i>
                        <span class="karaoke-level-badge" id="karaokeLevelBadge"></span>
                    </button>
                </div>
            </div>

            <!-- Bottom Controls -->
            <div class="bottom-controls">
                <div class="progress-section">
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-played" id="progressPlayed"></div>
                        <div class="progress-thumb" id="progressThumb"></div>
                    </div>
                    <div class="progress-times">
                        <span id="currentTime">0:00</span>
                        <span id="totalTime">0:00</span>
                    </div>
                </div>

                <div class="controls-section">
                    <div class="volume-section">
                        <i class="fas fa-volume-down"></i>
                        <input type="range" id="volumeSlider" min="0" max="100" value="80" class="slider-range">
                    </div>
                    <div class="playback-btns">
                        <button class="ctrl-btn" id="prevBtn"><i class="fas fa-backward-step"></i></button>
                        <button class="ctrl-btn ctrl-play" id="playBtn"><i class="fas fa-play" id="playIcon"></i></button>
                        <button class="ctrl-btn" id="nextBtn"><i class="fas fa-forward-step"></i></button>
                    </div>
                    <div class="spacer-right"></div>
                </div>
            </div>
        </div>
    </div>

    <audio id="audioOriginal" preload="auto"></audio>
    <audio id="audioInstrumental" preload="auto"></audio>

    <script src="{{ url_for('static', filename='js/karaoke-player.js') }}"></script>
</body>
</html>
