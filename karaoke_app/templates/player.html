<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KaraoKing</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/player.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="bg-gradient" id="bgGradient"></div>

    <div class="app">
        <!-- Top Bar -->
        <div class="top-bar">
            <button class="btn-icon" id="backBtn" title="Accueil">
                <i class="fas fa-chevron-down"></i>
            </button>
            <div class="top-bar-title">
                <span class="now-playing-label" id="nowPlayingLabel">KaraoKing</span>
            </div>
            <div class="top-bar-actions">
                <a href="/library" class="btn-icon" title="Bibliotheque">
                    <i class="fas fa-list"></i>
                </a>
                <a href="/admin" class="btn-icon" title="Administration">
                    <i class="fas fa-cog"></i>
                </a>
            </div>
        </div>

        <!-- Song List View (HOME) -->
        <div class="song-list-view" id="songListView">

            <!-- Hero Section -->
            <div class="hero-section" id="heroSection">
                <div class="hero-content">
                    <div class="hero-icon-row">
                        <span class="hero-icon"><i class="fas fa-microphone-alt"></i></span>
                        <span class="hero-icon hero-icon-delay"><i class="fas fa-music"></i></span>
                        <span class="hero-icon hero-icon-delay2"><i class="fas fa-headphones"></i></span>
                    </div>
                    <h1 class="hero-title">Bienvenue sur <span class="hero-accent">KaraoKing</span></h1>
                    <p class="hero-subtitle">Choisissez une chanson et lancez le karaoke</p>
                </div>
            </div>

            <!-- Search -->
            <div class="search-bar-wrap" id="searchBarWrap" style="display:none;">
                <div class="search-bar">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="searchInput" class="search-input" placeholder="Rechercher une chanson ou un artiste...">
                    <button class="search-clear" id="searchClear" style="display:none;"><i class="fas fa-times"></i></button>
                </div>
            </div>

            <!-- Stats bar -->
            <div class="stats-bar" id="statsBar" style="display:none;">
                <div class="stat-chip"><i class="fas fa-compact-disc"></i> <span id="statTotal">0</span> chansons</div>
                <div class="stat-chip"><i class="fas fa-star"></i> <span id="statKaraoke">0</span> karaoke</div>
                <div class="stat-chip"><i class="fas fa-align-left"></i> <span id="statLyrics">0</span> avec paroles</div>
            </div>

            <!-- Karaoke Ready Section -->
            <div class="home-section" id="karaokeSection" style="display:none;">
                <div class="section-header">
                    <h2><i class="fas fa-star"></i> Prets pour le karaoke</h2>
                    <span class="section-badge" id="karaokeBadge">0</span>
                </div>
                <div class="song-cards-scroll" id="karaokeCards"></div>
            </div>

            <!-- All Songs Section -->
            <div class="home-section" id="allSongsSection">
                <div class="section-header">
                    <h2><i class="fas fa-music"></i> Toutes les chansons</h2>
                </div>
                <div class="song-grid" id="songList">
                    <div class="empty-library">
                        <div class="empty-icon-wrap">
                            <i class="fas fa-record-vinyl"></i>
                        </div>
                        <h3>Aucune chanson disponible</h3>
                        <p>Importez vos premieres chansons depuis l'interface admin</p>
                    </div>
                </div>
            </div>

        </div>

        <!-- Now Playing View -->
        <div class="now-playing-view" id="nowPlayingView" style="display:none;">

            <!-- Main content: Cover + Lyrics side by side -->
            <div class="now-playing-main">
                <!-- Cover Art Panel -->
                <div class="cover-panel">
                    <div class="cover-art" id="coverArt">
                        <i class="fas fa-music"></i>
                    </div>
                    <div class="song-info-text">
                        <h2 class="song-title" id="songTitle">Song Title</h2>
                        <p class="song-artist" id="songArtist">Artist</p>
                    </div>
                </div>

                <!-- Lyrics Panel -->
                <div class="lyrics-panel">
                    <div class="lyrics-section" id="lyricsSection">
                        <div class="lyrics-scroll" id="lyricsScroll">
                            <div class="lyrics-spacer"></div>
                            <div class="lyrics-spacer"></div>
                        </div>
                    </div>
                    <!-- Two independent volume sliders for each track -->
                    <div class="track-sliders-container" id="trackSlidersContainer">
                        <div class="track-slider">
                            <i class="fas fa-microphone track-slider-icon"></i>
                            <input type="range" id="vocalsSlider" min="0" max="100" value="100" class="slider-range vocal-range" title="Volume voix">
                        </div>
                        <div class="track-slider">
                            <i class="fas fa-guitar track-slider-icon"></i>
                            <input type="range" id="instrumentalSlider" min="0" max="100" value="100" class="slider-range instrumental-range" title="Volume instrumental">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bottom Controls -->
            <div class="bottom-controls">
                <div class="progress-section">
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-played" id="progressPlayed"></div>
                        <div class="progress-thumb" id="progressThumb"></div>
                    </div>
                    <div class="progress-times">
                        <span id="currentTime">0:00</span>
                        <span id="totalTime">0:00</span>
                    </div>
                </div>

                <div class="controls-section">
                    <div class="volume-section">
                        <i class="fas fa-volume-down"></i>
                        <input type="range" id="volumeSlider" min="0" max="100" value="80" class="slider-range">
                    </div>
                    <div class="playback-btns">
                        <button class="ctrl-btn" id="prevSongBtn" title="Chanson precedente"><i class="fas fa-backward-step"></i></button>
                        <button class="ctrl-btn ctrl-seek" id="seekBackBtn" title="Reculer 10s"><i class="fas fa-rotate-left"></i><span class="seek-label">10</span></button>
                        <button class="ctrl-btn ctrl-play" id="playBtn"><i class="fas fa-play" id="playIcon"></i></button>
                        <button class="ctrl-btn ctrl-seek" id="seekFwdBtn" title="Avancer 10s"><i class="fas fa-rotate-right"></i><span class="seek-label">10</span></button>
                        <button class="ctrl-btn" id="nextSongBtn" title="Chanson suivante"><i class="fas fa-forward-step"></i></button>
                    </div>
                    <div class="spacer-right"></div>
                </div>
            </div>
        </div>
    </div>

    <audio id="audioVocals" preload="auto"></audio>
    <audio id="audioInstrumental" preload="auto"></audio>

    <script src="{{ url_for('static', filename='js/karaoke-player.js') }}"></script>
</body>
</html>
