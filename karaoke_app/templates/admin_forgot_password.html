<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe oublie - KaraoKing</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/fontawesome/all.min.css') }}">
</head>
<body>
    <div style="min-height:100vh; display:flex; align-items:center; justify-content:center;">
        <div class="upload-card" style="max-width:420px; width:100%;">
            <div style="text-align:center; margin-bottom:32px;">
                <i class="fas fa-key" style="font-size:40px; color:var(--accent); margin-bottom:16px; display:block;"></i>
                <h2 style="font-size:22px; font-weight:700;">Reinitialiser le mot de passe</h2>
                <p style="color:var(--text-muted); font-size:14px; margin-top:8px;">
                    Entrez votre nom d'utilisateur et votre <strong>mot de passe actuel</strong> pour en definir un nouveau.
                </p>
            </div>

            {% if success %}
            <div style="background:rgba(30,180,80,0.1); border:1px solid rgba(30,180,80,0.3); border-radius:8px; padding:14px 16px; margin-bottom:20px; text-align:center;">
                <i class="fas fa-check-circle" style="color:#1eb450; margin-right:6px;"></i>
                <span style="font-size:14px; color:#1eb450;">{{ success }}</span>
            </div>
            <div class="form-actions">
                <a href="/admin/login" class="btn btn-accent btn-lg" style="width:100%; text-align:center; text-decoration:none;">
                    <i class="fas fa-sign-in-alt"></i> Se connecter
                </a>
            </div>
            {% else %}
            <form method="POST" action="/admin/forgot-password">
                <div class="form-group">
                    <label for="username">Nom d'utilisateur</label>
                    <input type="text" id="username" name="username" class="form-input"
                           placeholder="Votre nom d'utilisateur" required autocomplete="username" autofocus>
                </div>
                <div class="form-group">
                    <label for="current_password">Mot de passe actuel</label>
                    <input type="password" id="current_password" name="current_password" class="form-input"
                           placeholder="Votre mot de passe actuel" required autocomplete="current-password">
                    <button type="button" onclick="toggleCurrentVisibility()"
                            style="background:none; border:none; color:var(--text-muted); font-size:12px; cursor:pointer; padding:4px 0; margin-top:4px;">
                        <i class="fas fa-eye" id="toggleIcon"></i> Afficher
                    </button>
                </div>
                <div class="form-group">
                    <label for="new_password">Nouveau mot de passe</label>
                    <input type="password" id="new_password" name="new_password" class="form-input"
                           placeholder="8 caracteres minimum" required minlength="8" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirmer le nouveau mot de passe</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-input"
                           placeholder="Retapez le mot de passe" required minlength="8" autocomplete="new-password">
                </div>
                {% if error %}
                <p style="color:var(--danger); font-size:13px; margin-bottom:16px;">{{ error }}</p>
                {% endif %}
                <div class="form-actions">
                    <button type="submit" class="btn btn-accent btn-lg" style="width:100%;">
                        <i class="fas fa-redo"></i> Reinitialiser le mot de passe
                    </button>
                </div>
            </form>
            {% endif %}

            <p style="text-align:center; margin-top:24px;">
                <a href="/admin/login" style="color:var(--text-muted); font-size:13px; text-decoration:none;">
                    <i class="fas fa-arrow-left"></i> Retour a la connexion
                </a>
            </p>
        </div>
    </div>

    <script>
        function toggleCurrentVisibility() {
            var inp = document.getElementById('current_password');
            var ico = document.getElementById('toggleIcon');
            if (inp.type === 'password') {
                inp.type = 'text';
                ico.className = 'fas fa-eye-slash';
            } else {
                inp.type = 'password';
                ico.className = 'fas fa-eye';
            }
        }
    </script>
</body>
</html>
