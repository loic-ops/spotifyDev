<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; img-src * data:; media-src *;">
    <title>KaraoKing</title>
    <link rel="stylesheet" href="../css/app.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-layout">
        <div class="app-content">
            <div class="top-bar">
                <div class="top-bar-title">KaraoKing</div>
                <button class="icon-btn" id="settingsBtn" title="Serveur"><i class="fas fa-server"></i></button>
            </div>

            <div class="scroll-content" id="content">
                <!-- Search -->
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" class="search-input" placeholder="Rechercher chanson, artiste...">
                </div>

                <div id="mainContent">
                    <div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Chargement...</p></div>
                </div>
            </div>

            <!-- Mini Player -->
            <div class="mini-player" id="miniPlayer">
                <div class="mini-player-cover" id="miniCover"><div class="song-row-cover-ph"><i class="fas fa-music"></i></div></div>
                <div class="mini-player-info">
                    <div class="mini-player-title" id="miniTitle">-</div>
                    <div class="mini-player-artist" id="miniArtist">-</div>
                </div>
                <button class="mini-player-btn" id="miniPlayBtn"><i class="fas fa-play"></i></button>
            </div>

            <nav class="bottom-nav">
                <button class="nav-btn active" data-page="home"><i class="fas fa-home"></i><span>Accueil</span></button>
                <button class="nav-btn" data-page="library"><i class="fas fa-search"></i><span>Recherche</span></button>
                <button class="nav-btn" data-page="player"><i class="fas fa-play-circle"></i><span>Lecteur</span></button>
            </nav>
        </div>
    </div>

    <audio id="audioVocals" preload="auto"></audio>
    <audio id="audioInstrumental" preload="auto"></audio>

    <script>
        let songs = [];
        let currentSong = null;
        let isPlaying = false;
        const audioV = document.getElementById('audioVocals');
        const audioI = document.getElementById('audioInstrumental');

        function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
        function fmt(s) { return (s||'').replace(/_/g,' ').replace(/\s*-\s*/g,' - ').trim(); }

        // Nav
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (btn.dataset.page === 'home') return;
                if (currentSong) sessionStorage.setItem('currentSong', JSON.stringify(currentSong));
                window.karaoking.goto(btn.dataset.page);
            });
        });
        document.getElementById('settingsBtn').addEventListener('click', () => window.karaoking.goConnect());

        document.getElementById('miniPlayer').addEventListener('click', (e) => {
            if (e.target.closest('.mini-player-btn')) return;
            if (currentSong) { sessionStorage.setItem('currentSong', JSON.stringify(currentSong)); window.karaoking.goto('player'); }
        });

        document.getElementById('miniPlayBtn').addEventListener('click', () => {
            if (!currentSong) return;
            if (isPlaying) { audioV.pause(); audioI.pause(); isPlaying = false; }
            else { audioV.play(); if (audioI.src) { audioI.currentTime = audioV.currentTime; audioI.play(); } isPlaying = true; }
            document.getElementById('miniPlayBtn').innerHTML = `<i class="fas fa-${isPlaying ? 'pause' : 'play'}"></i>`;
        });

        // Search (filter all visible items)
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase().trim();
            document.querySelectorAll('.song-card, .song-row').forEach(el => {
                const id = el.dataset.id;
                const song = songs.find(s => s.id === id);
                if (!song) return;
                el.style.display = (!q || song.title.toLowerCase().includes(q) || (song.artist||'').toLowerCase().includes(q)) ? '' : 'none';
            });
        });

        async function loadHome() {
            songs = await window.karaoking.fetchApi('/api/songs') || [];
            const main = document.getElementById('mainContent');

            if (!songs.length) {
                main.innerHTML = '<div class="empty-state"><i class="fas fa-record-vinyl"></i><h3>Aucune chanson</h3><p>Importez des chansons depuis l\'admin du serveur</p></div>';
                return;
            }

            const karaokeSongs = songs.filter(s => s.has_instrumental && s.has_lyrics);
            const recentSongs = songs.slice(0, 8);

            let html = '';

            // Upcoming / Karaoke cards
            const cardSongs = karaokeSongs.length ? karaokeSongs : songs.slice(0, 6);
            html += `<div class="section-header"><div class="section-title">A decouvrir</div></div>`;
            html += '<div class="h-scroll">';
            for (const song of cardSongs) {
                const coverUrl = await window.karaoking.getCoverUrl(song.id);
                html += `
                <div class="song-card" data-id="${esc(song.id)}">
                    <div class="song-card-cover">
                        <img src="${coverUrl}" alt="" onerror="this.parentElement.innerHTML='<div class=cover-placeholder><i class=\\'fas fa-music\\'></i></div>'">
                        <div class="song-card-play"><i class="fas fa-play"></i></div>
                    </div>
                    <div class="song-card-title">${esc(fmt(song.title))}</div>
                    <div class="song-card-artist">${esc(song.artist || 'Artiste inconnu')}</div>
                </div>`;
            }
            html += '</div>';

            // Recent list
            html += `<div class="section-header"><div class="section-title">Chansons recentes</div><button class="section-see-all" id="seeAllBtn">Voir tout</button></div>`;
            html += '<div class="song-list">';
            for (let i = 0; i < recentSongs.length; i++) {
                const song = recentSongs[i];
                const coverUrl = await window.karaoking.getCoverUrl(song.id);
                html += `
                <div class="song-row" data-id="${esc(song.id)}">
                    <div class="song-row-cover">
                        <img src="${coverUrl}" alt="" onerror="this.parentElement.innerHTML='<div class=song-row-cover-ph><i class=\\'fas fa-music\\'></i></div>'">
                    </div>
                    <div class="song-row-info">
                        <div class="song-row-title">${esc(fmt(song.title))}</div>
                        <div class="song-row-artist">${esc(song.artist || 'Artiste inconnu')}</div>
                    </div>
                </div>`;
            }
            html += '</div>';

            main.innerHTML = html;

            // Bind clicks
            main.querySelectorAll('.song-card, .song-row').forEach(el => {
                el.addEventListener('click', () => playSong(el.dataset.id));
            });

            const seeAllBtn = document.getElementById('seeAllBtn');
            if (seeAllBtn) seeAllBtn.addEventListener('click', () => window.karaoking.goto('library'));
        }

        async function playSong(songId) {
            const song = songs.find(s => s.id === songId);
            if (!song) return;
            currentSong = song;

            if (song.has_vocals && song.has_instrumental) {
                audioV.src = await window.karaoking.getAudioUrl(song.id, 'vocals');
                audioI.src = await window.karaoking.getAudioUrl(song.id, 'instrumental');
            } else {
                audioV.src = await window.karaoking.getAudioUrl(song.id, 'original');
                audioI.src = '';
            }
            audioV.load(); if (audioI.src) audioI.load();
            audioV.play(); if (audioI.src) { audioI.currentTime = 0; audioI.play(); }
            isPlaying = true;

            const mini = document.getElementById('miniPlayer');
            mini.classList.add('visible');
            document.getElementById('miniTitle').textContent = fmt(song.title);
            document.getElementById('miniArtist').textContent = song.artist || 'Artiste inconnu';
            document.getElementById('miniPlayBtn').innerHTML = '<i class="fas fa-pause"></i>';

            const coverUrl = await window.karaoking.getCoverUrl(song.id);
            document.getElementById('miniCover').innerHTML = `<img src="${coverUrl}" alt="" onerror="this.parentElement.innerHTML='<div class=song-row-cover-ph><i class=\\'fas fa-music\\'></i></div>'">`;
        }

        audioV.addEventListener('ended', () => {
            isPlaying = false;
            document.getElementById('miniPlayBtn').innerHTML = '<i class="fas fa-play"></i>';
            if (currentSong) {
                const idx = songs.findIndex(s => s.id === currentSong.id);
                if (idx < songs.length - 1) playSong(songs[idx + 1].id);
            }
        });

        document.addEventListener('DOMContentLoaded', loadHome);
    </script>
</body>
</html>
