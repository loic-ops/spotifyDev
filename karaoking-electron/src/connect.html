<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaraoKing - Connexion</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0C0A0A;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            -webkit-app-region: drag;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Left: Image panel */
        .image-panel {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .image-panel img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.7);
        }

        .image-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 40px 32px;
            background: linear-gradient(transparent, rgba(12, 10, 10, 0.95));
        }

        .image-overlay h2 {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
        }

        .image-overlay p {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
        }

        /* Right: Connect form panel */
        .form-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: linear-gradient(180deg, #1A1212 0%, #0C0A0A 100%);
            -webkit-app-region: no-drag;
        }

        .logo-wrap {
            width: 100px;
            height: 100px;
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(229, 57, 53, 0.3);
            border: 2px solid rgba(229, 57, 53, 0.4);
        }

        .logo-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .brand-name {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #E53935, #FF8A65);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-sub {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 40px;
        }

        .form-group {
            width: 100%;
            max-width: 340px;
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .form-input:focus {
            border-color: #E53935;
            box-shadow: 0 0 0 3px rgba(229, 57, 53, 0.15);
            background: rgba(255, 255, 255, 0.08);
        }

        .btn-connect {
            width: 100%;
            max-width: 340px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg, #E53935, #D32F2F);
            color: #fff;
            margin-top: 8px;
            letter-spacing: 0.5px;
        }

        .btn-connect:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(229, 57, 53, 0.4);
        }

        .btn-connect:active {
            transform: translateY(0);
        }

        .btn-connect:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .error-msg {
            max-width: 340px;
            width: 100%;
            margin-top: 14px;
            padding: 10px 14px;
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 10px;
            color: #f87171;
            font-size: 13px;
            display: none;
        }

        .error-msg.show {
            display: block;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            margin-right: 6px;
            vertical-align: middle;
        }

        .status-dot.connected {
            background: #22c55e;
        }

        .footer-text {
            margin-top: 40px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Left: Image -->
        <div class="image-panel">
            <img src="assets/connect-bg.jpg" alt="">
            <div class="image-overlay">
                <h2>Votre karaoke, partout.</h2>
                <p>Connectez-vous a votre serveur KaraoKing pour commencer</p>
            </div>
        </div>

        <!-- Right: Form -->
        <div class="form-panel">
            <div class="logo-wrap">
                <img src="assets/logo.jpg" alt="KaraoKing">
            </div>

            <div class="brand-name">KaraoKing</div>
            <p class="brand-sub">Lecteur karaoke</p>

            <div class="form-group">
                <label class="form-label">Adresse du serveur</label>
                <input type="text" id="serverUrl" class="form-input"
                       placeholder="ex: 192.168.1.100:5001" autofocus>
            </div>

            <button id="connectBtn" class="btn-connect">
                Se connecter
            </button>

            <div class="error-msg" id="errorMsg"></div>

            <p class="footer-text">KaraoKing v1.0</p>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('serverUrl');
        const connectBtn = document.getElementById('connectBtn');
        const errorMsg = document.getElementById('errorMsg');

        // Load saved server URL
        window.karaoking.getSavedServer().then(config => {
            if (config.serverUrl) {
                urlInput.value = config.serverUrl.replace(/^https?:\/\//, '');
            }
        });

        async function connect() {
            const url = urlInput.value.trim();
            if (!url) {
                showError('Veuillez entrer une adresse de serveur');
                return;
            }

            errorMsg.classList.remove('show');
            connectBtn.disabled = true;
            connectBtn.innerHTML = '<span class="spinner"></span>Connexion...';

            const result = await window.karaoking.connectServer(url);

            if (!result.success) {
                showError(result.error);
                connectBtn.disabled = false;
                connectBtn.textContent = 'Se connecter';
            }
            // If success, the main process loads the server URL (page changes)
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.add('show');
        }

        connectBtn.addEventListener('click', connect);
        urlInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') connect();
        });
    </script>
</body>
</html>
